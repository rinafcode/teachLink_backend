# RBAC — allow the rollback Job to delete canary Deployment and Ingress
apiVersion: v1
kind: ServiceAccount
metadata:
  name: canary-rollback
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: canary-rollback
  namespace: default
rules:
  - apiGroups: ['apps']
    resources: ['deployments']
    verbs: ['get', 'delete', 'patch']
  - apiGroups: ['networking.k8s.io']
    resources: ['ingresses']
    verbs: ['get', 'delete']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: canary-rollback
  namespace: default
subjects:
  - kind: ServiceAccount
    name: canary-rollback
    namespace: default
roleRef:
  kind: Role
  name: canary-rollback
  apiGroup: rbac.authorization.k8s.io
---
# Rollback Job — run manually (or triggered by CI/CD / the health-check CronJob)
# to remove all canary resources and restore 100% traffic to stable.
#
# Usage:
#   kubectl create job canary-rollback-$(date +%s) \
#     --from=job/canary-rollback -n default
#
# Or apply this file directly when a rollback is needed:
#   kubectl apply -f k8s/canary/rollback.yaml
#   kubectl create job canary-rollback-manual --from=job/canary-rollback
apiVersion: batch/v1
kind: Job
metadata:
  name: canary-rollback
  namespace: default
  annotations:
    # Set to "manual" so this Job is not run automatically on apply.
    # Trigger it explicitly when a rollback is required.
    rollback/trigger: 'manual'
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: canary-rollback
      restartPolicy: Never
      containers:
        - name: rollback
          image: bitnami/kubectl:1.29
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== Canary rollback started ==="

              # 1. Remove canary ingress to stop routing traffic to canary
              if kubectl get ingress teachlink-backend-canary -n default &>/dev/null; then
                kubectl delete ingress teachlink-backend-canary -n default
                echo "Deleted canary ingress"
              else
                echo "Canary ingress not found — already removed"
              fi

              # 2. Scale canary deployment to 0 (graceful drain before delete)
              if kubectl get deployment teachlink-backend-canary -n default &>/dev/null; then
                kubectl scale deployment teachlink-backend-canary --replicas=0 -n default
                kubectl wait --for=condition=available \
                  deployment/teachlink-backend-canary \
                  --timeout=60s -n default || true
                kubectl delete deployment teachlink-backend-canary -n default
                echo "Deleted canary deployment"
              else
                echo "Canary deployment not found — already removed"
              fi

              # 3. Confirm stable deployment is healthy
              kubectl rollout status deployment/teachlink-backend -n default --timeout=120s
              echo "=== Rollback complete — 100% traffic on stable ==="

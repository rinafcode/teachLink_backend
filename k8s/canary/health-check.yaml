# PodMonitor — scrapes /metrics from canary pods (requires Prometheus Operator)
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: teachlink-backend-canary
  namespace: default
  labels:
    app: teachlink-backend
    track: canary
spec:
  selector:
    matchLabels:
      app: teachlink-backend
      track: canary
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: 15s
---
# CronJob: polls /health on the canary service every minute and deletes the
# canary deployment automatically if the endpoint returns a non-2xx status.
# In production, replace this with a proper progressive-delivery controller
# (Argo Rollouts / Flagger) for richer analysis.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: canary-health-check
  namespace: default
spec:
  schedule: '* * * * *' # every minute
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: health-checker
              image: curlimages/curl:8.7.1
              command:
                - /bin/sh
                - -c
                - |
                  STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                    http://teachlink-backend-canary.default.svc.cluster.local/health)
                  echo "Canary /health returned HTTP $STATUS"
                  if [ "$STATUS" != "200" ]; then
                    echo "Canary unhealthy — triggering rollback"
                    exit 1
                  fi
                  echo "Canary healthy"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: teachlink-backend-canary
  namespace: default
  labels:
    app: teachlink-backend
    track: canary
  annotations:
    deployment.kubernetes.io/canary: 'true'
spec:
  replicas: 1 # 1 canary : 4 stable = ~20% traffic
  selector:
    matchLabels:
      app: teachlink-backend
      track: canary
  template:
    metadata:
      labels:
        app: teachlink-backend
        track: canary
    spec:
      containers:
        - name: teachlink-backend
          image: teachlink/backend:canary # override with new image tag at deploy time
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: teachlink-backend-secrets
          resources:
            requests:
              cpu: '100m'
              memory: '256Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

apiVersion: apps/v1
kind: Deployment
metadata:
  name: teachlink-backend
  labels:
    app: teachlink-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: teachlink-backend
  template:
    metadata:
      labels:
        app: teachlink-backend
    spec:
      containers:
        - name: teachlink-backend
          image: teachlink-backend:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: '100m'
              memory: '256Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          ports:
            - containerPort: 3000
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

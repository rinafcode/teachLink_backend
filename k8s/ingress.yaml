apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: teachlink-backend-ingress
spec:
  rules:
    - host: example.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: teachlink-backend-service
                port:
                  number: 80

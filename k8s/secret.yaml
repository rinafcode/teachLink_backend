apiVersion: v1
kind: Secret
metadata:
  name: teachlink-backend-secrets
  namespace: default
  labels:
    app: teachlink-backend
type: Opaque
# All values must be base64-encoded.
# Generate with: echo -n 'value' | base64
# DO NOT commit real secrets — use a secrets manager (AWS Secrets Manager, Vault, Sealed Secrets).
stringData:
  # Database
  DATABASE_HOST: "postgres-service"
  DATABASE_USER: "CHANGE_ME"
  DATABASE_PASSWORD: "CHANGE_ME"
  DATABASE_NAME: "teachlink"
  DATABASE_REPLICA_HOSTS: ""
  # JWT
  JWT_SECRET: "CHANGE_ME_min_32_chars"
  JWT_REFRESH_SECRET: "CHANGE_ME_min_32_chars"
  ENCRYPTION_SECRET: "CHANGE_ME_exactly_32_chars______"
  # Redis
  REDIS_HOST: "redis-service"
  # Session
  SESSION_SECRET: "CHANGE_ME_min_32_chars"
  SESSION_COOKIE_NAME: "teachlink.sid"
  SESSION_PREFIX: "sess:"
  # Stripe
  STRIPE_SECRET_KEY: "CHANGE_ME"
  STRIPE_WEBHOOK_SECRET: "CHANGE_ME"
  # AWS
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  AWS_S3_BUCKET: "CHANGE_ME"
  AWS_KMS_KEY_ID: ""
  # SendGrid
  SENDGRID_API_KEY: "CHANGE_ME"
  # SMTP
  SMTP_HOST: "CHANGE_ME"
  SMTP_PORT: "587"
  SMTP_USER: "CHANGE_ME"
  SMTP_PASS: "CHANGE_ME"
  EMAIL_FROM: "noreply@teachlink.io"
  EMAIL_FROM_NAME: "TeachLink"
  # Elasticsearch (optional)
  ELASTICSEARCH_NODE: ""
  ELASTICSEARCH_USERNAME: ""
  ELASTICSEARCH_PASSWORD: ""
  # App URL
  APP_URL: "https://api.teachlink.io"
  CORS_ALLOWED_ORIGINS: "https://teachlink.io,https://app.teachlink.io"

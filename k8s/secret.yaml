apiVersion: v1
kind: Secret
metadata:
  name: teachlink-backend-secret
  namespace: teachlink
  labels:
    app: teachlink-backend
type: Opaque
# Values must be base64-encoded: echo -n 'value' | base64
# Replace all placeholder values before applying to a cluster.
stringData:
  DATABASE_USER: "postgres"
  DATABASE_PASSWORD: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME"
  JWT_REFRESH_SECRET: "REPLACE_ME"
  ENCRYPTION_SECRET: "REPLACE_ME"
  SESSION_SECRET: "REPLACE_ME"
  STRIPE_SECRET_KEY: "REPLACE_ME"
  STRIPE_WEBHOOK_SECRET: "REPLACE_ME"
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET_NAME: "REPLACE_ME"
  SENDGRID_API_KEY: "REPLACE_ME"
  ELASTICSEARCH_USERNAME: ""
  ELASTICSEARCH_PASSWORD: ""

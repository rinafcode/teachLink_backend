apiVersion: v1
kind: ConfigMap
metadata:
  name: teachlink-backend-config
  namespace: teachlink
  labels:
    app: teachlink-backend
data:
  NODE_ENV: "production"
  PORT: "3000"
  # Database
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "teachlink"
  DATABASE_POOL_MAX: "30"
  DATABASE_POOL_MIN: "5"
  DATABASE_POOL_ACQUIRE_TIMEOUT_MS: "10000"
  DATABASE_POOL_IDLE_TIMEOUT_MS: "30000"
  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  # Elasticsearch
  ELASTICSEARCH_NODE: "http://elasticsearch-service:9200"
  ELASTICSEARCH_REQUEST_TIMEOUT: "30000"
  ELASTICSEARCH_MAX_RETRIES: "3"
  # JWT
  JWT_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"
  # Security
  BCRYPT_ROUNDS: "12"
  # Session
  SESSION_TTL_SECONDS: "604800"
  STICKY_SESSIONS_REQUIRED: "true"
  TRUST_PROXY: "true"
  # App
  APP_URL: "https://api.teachlink.io"
  CORS_ALLOWED_ORIGINS: "https://teachlink.io,https://app.teachlink.io"
  # Feature flags
  ENABLE_AUTH: "true"
  ENABLE_SESSION_MANAGEMENT: "true"
  ENABLE_PAYMENTS: "true"
  ENABLE_RATE_LIMITING: "true"
  ENABLE_OBSERVABILITY: "true"
  ENABLE_CACHING: "true"
  ENABLE_SEARCH: "true"
  ENABLE_NOTIFICATIONS: "true"
  ENABLE_SECURITY: "true"
  ENABLE_TENANCY: "true"
  ENABLE_MIGRATIONS: "true"
  # Circuit breaker
  CIRCUIT_BREAKER_TIMEOUT_MS: "3000"
  CIRCUIT_BREAKER_ERROR_THRESHOLD: "50"
  CIRCUIT_BREAKER_RESET_TIMEOUT_MS: "30000"
  # API versioning
  API_DEFAULT_VERSION: "1"
  API_SUPPORTED_VERSIONS: "1"

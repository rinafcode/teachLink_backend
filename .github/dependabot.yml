version: 2
updates:
  # npm dependencies - regular updates
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
      timezone: "UTC"
    open-pull-requests-limit: 20
    labels:
      - "dependencies"
      - "npm"
    reviewers:
      - "@teachlink/backend-maintainers"
    assignees:
      - "@teachlink/backend-maintainers"
    commit-message:
      prefix: "deps"
      prefix-development: "deps"
      include: "scope"
    ignore:
      # Ignore deprecated packages that we know about
      - dependency-name: "lodash"
        versions: [">=4.17.15 <5.0.0"]
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    # Automatically merge non-major version updates
    automerge:
      - type: "version"
        update-types:
          - "minor"
          - "patch"
        method: "squash"
    merge-conditions:
      - required
      - required

  # npm dependencies - security updates (more frequent)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "02:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
      - "npm"
    reviewers:
      - "@teachlink/backend-maintainers"
    assignees:
      - "@teachlink/backend-maintainers"
    commit-message:
      prefix: "deps"
      prefix-development: "deps"
      include: "scope"
    ignore: []
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    # Automatically merge security updates and minor/patch version updates
    automerge:
      - type: "security"
        method: "squash"
      - type: "version"
        update-types:
          - "minor"
          - "patch"
        method: "squash"
    merge-conditions:
      - required
      - required

  # Docker dependencies - regular updates
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "02:00"
      timezone: "UTC"
    open-pull-requests-limit: 5

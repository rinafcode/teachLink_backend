      include: "scope"
    ignore: []
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    # Automatically merge non-major version updates
    automerge:
      - type: "version"
        update-types:
          - "minor"
          - "patch"
        method: "squash"
    merge-conditions:
      - required
      - required

  # Docker dependencies - security updates (more frequent)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
      time: "02:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:

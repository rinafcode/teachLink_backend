    commit-message:
      prefix: "deps"
      prefix-development: "deps"
      include: "scope"
    ignore: []
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    # Automatically merge security updates and minor/patch version updates
    automerge:
      - type: "security"
        method: "squash"
      - type: "version"
        update-types:
          - "minor"
          - "patch"
        method: "squash"
    merge-conditions:
      - required

name: Deployment Verification

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run verify:env

      - run: npm run verify:backup

      - run: npm run predeploy

      - run: npm run postdeploy
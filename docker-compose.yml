# TeachLink Backend - Development Environment
#
# Start with:  docker compose up -d
# Stop with:   docker compose down
#
# This runs:
#   postgres:5432  - Primary database
#   redis:6379     - Caching, sessions, and job queues
#   app:3000       - NestJS API server (optional, can run locally instead)
#
# To run just the dependencies (recommended for local dev):
#   docker compose up -d postgres redis
#   npm run start:dev

version: "3.8"

networks:
  teachlink:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:
  # ──────────────────────────────────────────────
  # PostgreSQL 16 - Primary database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: teachlink-postgres
    restart: unless-stopped
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-teachlink}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - teachlink
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-teachlink}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ──────────────────────────────────────────────
  # Redis 7 - Caching, session store, and queues
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: teachlink-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command:
      - redis-server
      - --appendonly yes
      - --appendfsync everysec
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - teachlink
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ──────────────────────────────────────────────
  # NestJS API Server (optional - for dockerized dev)
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: teachlink-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - teachlink
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
